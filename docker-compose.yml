services:
  binance-monitor:
    build: .
    image: ghcr.io/chilohwei/binance-monitor:latest
    container_name: binance-monitor
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /app/data
    volumes:
      - monitor-data:/app/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    ports:
      - "${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.HEALTH_PORT||8080;require('http').get('http://localhost:'+p+'/health',r=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  monitor-data:
    driver: local
