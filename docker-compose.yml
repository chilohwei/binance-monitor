services:
  binance-monitor:
    image: ${IMAGE_NAME:-ghcr.io/chilohwei/binance-monitor}:${IMAGE_TAG:-1.0.5}
    build:
      context: .
    container_name: ${CONTAINER_NAME:-binance-monitor}
    init: true
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    env_file: .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATA_DIR: /app/data
      HEALTH_PORT: ${HEALTH_PORT:-8080}
    volumes:
      - monitor-data:/app/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    ports:
      - "127.0.0.1:${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"
    expose:
      - "${HEALTH_PORT:-8080}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    oom_score_adj: 0
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.HEALTH_PORT||8080;require('http').get('http://localhost:'+p+'/health',r=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - default
      - edge-proxy

volumes:
  monitor-data:
    driver: local

networks:
  edge-proxy:
    external: true
    name: ${EDGE_PROXY_NETWORK:-edge-proxy}
